<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おうち家計簿 🌼</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #FFD43B;
      --primary-dark: #FFAA00;
      --accent: #E67700;
      --danger: #ff6b6b;
      --success: #69db7c;
      --bg: #FFFBEE;
      --card: #FFFFFF;
      --border: #FFE680;
      --text: #3D2B00;
      --muted: #B08040;
      --on-primary: #3D2B00;
    }

    body {
      font-family: 'M PLUS Rounded 1c', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #FFD43B, #FFAA00);
      color: var(--on-primary);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 3px 12px rgba(255,180,0,0.35);
    }

    header h1 { font-size: 18px; font-weight: 800; letter-spacing: 0.02em; }
    header .year-selector { display: flex; align-items: center; gap: 8px; }
    header .year-selector button {
      background: rgba(255,255,255,0.45);
      border: none;
      color: var(--on-primary);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 17px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
    }
    header .year-selector button:hover { background: rgba(255,255,255,0.65); }
    header .year-selector span { font-size: 16px; font-weight: 800; min-width: 50px; text-align: center; }

    nav {
      display: flex;
      background: white;
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 53px;
      z-index: 99;
    }

    nav button {
      flex: 1;
      padding: 11px 8px;
      border: none;
      background: none;
      font-size: 12px;
      font-weight: 700;
      font-family: 'M PLUS Rounded 1c', sans-serif;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.15s;
    }

    nav button.active {
      color: var(--accent);
      border-bottom-color: var(--primary);
    }

    .page { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
    .page.active { display: block; }

    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: 0 2px 10px rgba(255,180,0,0.1), 0 1px 3px rgba(0,0,0,0.04);
      border: 1.5px solid #FFF3B0;
    }

    .card h2 {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 16px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 5px;
      margin-top: 13px;
      letter-spacing: 0.06em;
    }

    label:first-child { margin-top: 0; }

    input, select {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      font-family: 'M PLUS Rounded 1c', sans-serif;
      color: var(--text);
      background: #FFFDF5;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary-dark);
      box-shadow: 0 0 0 3px rgba(255,212,59,0.25);
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 800;
      font-family: 'M PLUS Rounded 1c', sans-serif;
      cursor: pointer;
      margin-top: 16px;
      transition: transform 0.12s, box-shadow 0.12s;
    }

    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(135deg, #FFD43B, #FFAA00);
      color: var(--on-primary);
      box-shadow: 0 4px 14px rgba(255,170,0,0.45);
    }
    .btn-primary:hover { box-shadow: 0 6px 18px rgba(255,170,0,0.55); }
    .btn-danger { background: var(--danger); color: white; box-shadow: 0 3px 10px rgba(255,107,107,0.35); }
    .btn-sm {
      display: inline-block;
      width: auto;
      padding: 5px 14px;
      font-size: 12px;
      margin-top: 0;
    }

    /* 集計テーブル */
    .summary-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .summary-table th {
      text-align: left;
      padding: 8px 10px;
      font-size: 10px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      border-bottom: 2px solid var(--border);
      letter-spacing: 0.06em;
    }

    .summary-table th:last-child { text-align: right; }

    .summary-table td {
      padding: 10px 10px;
      border-bottom: 1px solid var(--bg);
    }

    .summary-table td:last-child { text-align: right; font-weight: 700; }

    .summary-table tr:last-child td { border-bottom: none; }

    .summary-table .total-row td {
      font-weight: 800;
      color: var(--accent);
      border-top: 2px solid var(--border);
      border-bottom: none;
      padding-top: 12px;
    }

    .month-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      padding: 4px 0;
    }

    .month-header h3 {
      font-size: 14px;
      font-weight: 800;
    }

    .month-header .month-total {
      font-size: 14px;
      font-weight: 800;
      color: var(--accent);
    }

    .month-header .chevron {
      font-size: 12px;
      color: var(--muted);
      transition: transform 0.2s;
    }

    .month-header.collapsed .chevron { transform: rotate(-90deg); }

    .month-detail { overflow: hidden; transition: max-height 0.2s; }
    .month-detail.collapsed { max-height: 0 !important; }

    /* エントリリスト */
    .entry-item {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #FFF8D0;
      gap: 12px;
    }

    .entry-item:last-child { border-bottom: none; }

    .entry-badge {
      background: #FFF3B0;
      color: var(--accent);
      font-size: 11px;
      font-weight: 800;
      padding: 4px 9px;
      border-radius: 20px;
      white-space: nowrap;
      border: 1px solid #FFE066;
    }

    .entry-info { flex: 1; min-width: 0; }
    .entry-info .name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entry-info .meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .entry-amount { font-size: 14px; font-weight: 800; white-space: nowrap; color: var(--accent); }
    .entry-delete { color: #DDB080; background: none; border: none; cursor: pointer; font-size: 18px; padding: 4px; line-height: 1; }
    .entry-delete:hover { color: var(--danger); }

    /* 年間精算カード */
    .settlement-card {
      background: linear-gradient(135deg, #FFD43B 0%, #FFAA00 60%, #FF8C00 100%);
      color: var(--on-primary);
      border-radius: 20px;
      padding: 22px 20px;
      margin-bottom: 14px;
      box-shadow: 0 6px 24px rgba(255,160,0,0.4);
      position: relative;
      overflow: hidden;
    }

    .settlement-card::before {
      content: '🌻';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 52px;
      opacity: 0.2;
    }

    .settlement-card h2 { font-size: 12px; font-weight: 700; opacity: 0.75; margin-bottom: 4px; }
    .settlement-card .amount { font-size: 34px; font-weight: 800; margin: 4px 0 12px; }
    .settlement-card .half { font-size: 13px; opacity: 0.8; font-weight: 700; }
    .settlement-card .half span { font-size: 20px; font-weight: 800; }

    /* カテゴリ管理 */
    .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #FFF8D0;
      border: 1.5px solid #FFE066;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
    }
    .tag button { background: none; border: none; cursor: pointer; color: #DDB080; font-size: 16px; line-height: 1; padding: 0; }
    .tag button:hover { color: var(--danger); }

    .add-category-row { display: flex; gap: 8px; }
    .add-category-row input { flex: 1; }
    .add-category-row .btn { width: auto; flex-shrink: 0; padding: 11px 18px; }

    /* エクスポート */
    .export-row { display: flex; gap: 8px; }
    .export-row .btn { margin-top: 0; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .empty-state .icon { font-size: 44px; margin-bottom: 12px; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--accent);
      color: white;
      padding: 11px 22px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'M PLUS Rounded 1c', sans-serif;
      z-index: 999;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 4px 16px rgba(230,119,0,0.4);
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 400px) {
      .input-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>🌼 おうち家計簿</h1>
  <div class="year-selector">
    <button onclick="changeYear(-1)">‹</button>
    <span id="currentYearLabel">2026</span>
    <button onclick="changeYear(1)">›</button>
  </div>
</header>

<nav>
  <button class="active" onclick="showPage('input', this)">✏️ 入力</button>
  <button onclick="showPage('summary', this)">📊 集計</button>
  <button onclick="showPage('list', this)">📋 一覧</button>
  <button onclick="showPage('settings', this)">⚙️ 設定</button>
</nav>

<!-- 入力ページ -->
<div id="page-input" class="page active">
  <div class="card">
    <h2>🧾 支出を記録</h2>
    <div class="input-row">
      <div>
        <label>年月</label>
        <input type="month" id="inputMonth">
      </div>
      <div>
        <label>カテゴリ</label>
        <select id="inputCategory"></select>
      </div>
    </div>
    <label>項目</label>
    <input type="text" id="inputItem" placeholder="例：スーパー、薬局...">
    <label>金額（円）</label>
    <input type="number" id="inputAmount" placeholder="0" min="0" inputmode="numeric">
    <button class="btn btn-primary" onclick="addEntry()">✨ 登録する</button>
  </div>

  <div class="card" id="recentCard">
    <h2>🕐 最近の入力</h2>
    <div id="recentList"></div>
  </div>
</div>

<!-- 集計ページ -->
<div id="page-summary" class="page">
  <div class="settlement-card" id="settlementCard"></div>

  <div class="card">
    <h2>🏷️ カテゴリ別合計</h2>
    <table class="summary-table" id="categoryTable"></table>
  </div>

  <div id="monthlyAccordion"></div>
</div>

<!-- 一覧ページ -->
<div id="page-list" class="page">
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h2 style="margin:0">📋 全データ</h2>
      <div class="export-row">
        <button class="btn btn-primary btn-sm" onclick="exportCSV()">CSV出力</button>
      </div>
    </div>
    <div style="margin-bottom:12px">
      <input type="text" id="searchInput" placeholder="検索..." oninput="renderList()">
    </div>
    <div id="allList"></div>
  </div>
</div>

<!-- 設定ページ -->
<div id="page-settings" class="page">
  <div class="card">
    <h2>🎨 カテゴリ管理</h2>
    <div class="tag-list" id="categoryTags"></div>
    <div class="add-category-row">
      <input type="text" id="newCategoryInput" placeholder="新しいカテゴリ名">
      <button class="btn btn-primary" onclick="addCategory()">追加</button>
    </div>
  </div>

  <div class="card">
    <h2>🗑️ データ管理</h2>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px">全データを削除します。この操作は元に戻せません。</p>
    <button class="btn btn-danger" onclick="clearAllData()">全データを削除</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ---- State ----
  let currentYear = new Date().getFullYear();

  const DEFAULT_CATEGORIES = ['食費', '日用品', '衣服・美容', '医療・健康', '交通費', '娯楽・外食', '子ども', 'その他'];

  function getData() {
    return JSON.parse(localStorage.getItem('kakeibo_entries') || '[]');
  }

  function saveData(entries) {
    localStorage.setItem('kakeibo_entries', JSON.stringify(entries));
  }

  function getCategories() {
    const saved = localStorage.getItem('kakeibo_categories');
    return saved ? JSON.parse(saved) : DEFAULT_CATEGORIES;
  }

  function saveCategories(cats) {
    localStorage.setItem('kakeibo_categories', JSON.stringify(cats));
  }

  function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  // ---- UI ----
  function showPage(name, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    btn.classList.add('active');
    if (name === 'summary') renderSummary();
    if (name === 'list') renderList();
    if (name === 'settings') renderSettings();
    if (name === 'input') renderRecent();
  }

  function changeYear(delta) {
    currentYear += delta;
    document.getElementById('currentYearLabel').textContent = currentYear;
    const activePage = document.querySelector('.page.active').id.replace('page-', '');
    if (activePage === 'summary') renderSummary();
    if (activePage === 'list') renderList();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function formatMoney(n) {
    return '¥' + Number(n).toLocaleString();
  }

  // ---- Input ----
  function initInputForm() {
    const monthInput = document.getElementById('inputMonth');
    const now = new Date();
    monthInput.value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

    refreshCategorySelect();
  }

  function refreshCategorySelect() {
    const sel = document.getElementById('inputCategory');
    const cats = getCategories();
    const current = sel.value;
    sel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
    if (current && cats.includes(current)) sel.value = current;
  }

  function addEntry() {
    const month = document.getElementById('inputMonth').value;
    const category = document.getElementById('inputCategory').value;
    const item = document.getElementById('inputItem').value.trim();
    const amount = parseInt(document.getElementById('inputAmount').value);

    if (!month) return showToast('年月を選択してください');
    if (!item) return showToast('項目を入力してください');
    if (!amount || amount <= 0) return showToast('金額を入力してください');

    const [year, mo] = month.split('-').map(Number);
    const entries = getData();
    entries.push({ id: generateId(), year, month: mo, category, item, amount });
    saveData(entries);

    document.getElementById('inputItem').value = '';
    document.getElementById('inputAmount').value = '';
    renderRecent();
    showToast(`登録しました: ${item} ${formatMoney(amount)}`);
  }

  function renderRecent() {
    const entries = getData()
      .sort((a, b) => b.id.localeCompare(a.id))
      .slice(0, 5);

    const el = document.getElementById('recentList');
    if (entries.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📝</div>まだ記録がありません</div>';
      return;
    }
    el.innerHTML = entries.map(e => entryHtml(e)).join('');
  }

  function entryHtml(e) {
    return `
      <div class="entry-item" id="entry-${e.id}">
        <span class="entry-badge">${e.category}</span>
        <div class="entry-info">
          <div class="name">${escHtml(e.item)}</div>
          <div class="meta">${e.year}年${e.month}月</div>
        </div>
        <span class="entry-amount">${formatMoney(e.amount)}</span>
        <button class="entry-delete" onclick="deleteEntry('${e.id}')" title="削除">×</button>
      </div>
    `;
  }

  function deleteEntry(id) {
    const entries = getData().filter(e => e.id !== id);
    saveData(entries);
    const el = document.getElementById('entry-' + id);
    if (el) el.remove();
    showToast('削除しました');
    const activePage = document.querySelector('.page.active').id;
    if (activePage === 'page-summary') renderSummary();
  }

  // ---- Summary ----
  function renderSummary() {
    const entries = getData().filter(e => e.year === currentYear);
    const total = entries.reduce((s, e) => s + e.amount, 0);

    // Settlement card
    document.getElementById('settlementCard').innerHTML = `
      <h2>${currentYear}年 年間合計</h2>
      <div class="amount">${formatMoney(total)}</div>
      <div class="half">折半額: <span>${formatMoney(Math.ceil(total / 2))}</span></div>
    `;

    // Category totals
    const catMap = {};
    entries.forEach(e => {
      catMap[e.category] = (catMap[e.category] || 0) + e.amount;
    });
    const sorted = Object.entries(catMap).sort((a, b) => b[1] - a[1]);

    const catTable = document.getElementById('categoryTable');
    if (sorted.length === 0) {
      catTable.innerHTML = '<tr><td style="padding:20px;text-align:center;color:var(--muted)">データがありません</td></tr>';
    } else {
      catTable.innerHTML = `
        <tr><th>カテゴリ</th><th>件数</th><th>金額</th></tr>
        ${sorted.map(([cat, amt]) => {
          const count = entries.filter(e => e.category === cat).length;
          const pct = total > 0 ? Math.round(amt / total * 100) : 0;
          return `<tr><td>${escHtml(cat)} <small style="color:var(--muted)">${pct}%</small></td><td style="color:var(--muted)">${count}件</td><td>${formatMoney(amt)}</td></tr>`;
        }).join('')}
        <tr class="total-row"><td colspan="2">合計</td><td>${formatMoney(total)}</td></tr>
      `;
    }

    // Monthly accordion
    const monthMap = {};
    entries.forEach(e => {
      if (!monthMap[e.month]) monthMap[e.month] = [];
      monthMap[e.month].push(e);
    });

    const accordion = document.getElementById('monthlyAccordion');
    accordion.innerHTML = Object.keys(monthMap)
      .sort((a, b) => b - a)
      .map(mo => {
        const mes = monthMap[mo];
        const mTotal = mes.reduce((s, e) => s + e.amount, 0);
        const mCatMap = {};
        mes.forEach(e => { mCatMap[e.category] = (mCatMap[e.category] || 0) + e.amount; });
        const mSorted = Object.entries(mCatMap).sort((a, b) => b[1] - a[1]);
        const uid = `month-${mo}`;

        return `
          <div class="card" style="margin-bottom:12px">
            <div class="month-header" onclick="toggleMonth('${uid}')">
              <h3>${mo}月</h3>
              <div style="display:flex;align-items:center;gap:12px">
                <span class="month-total">${formatMoney(mTotal)}</span>
                <span class="chevron" id="chevron-${uid}">▼</span>
              </div>
            </div>
            <div class="month-detail" id="${uid}" style="max-height:1000px">
              <table class="summary-table" style="margin-top:12px">
                <tr><th>カテゴリ</th><th>金額</th></tr>
                ${mSorted.map(([cat, amt]) => `<tr><td>${escHtml(cat)}</td><td>${formatMoney(amt)}</td></tr>`).join('')}
              </table>
            </div>
          </div>
        `;
      }).join('');
  }

  function toggleMonth(uid) {
    const el = document.getElementById(uid);
    const chevron = document.getElementById('chevron-' + uid);
    const header = el.previousElementSibling;
    const isCollapsed = el.classList.contains('collapsed');
    if (isCollapsed) {
      el.classList.remove('collapsed');
      chevron.style.transform = '';
      header.classList.remove('collapsed');
    } else {
      el.classList.add('collapsed');
      chevron.style.transform = 'rotate(-90deg)';
      header.classList.add('collapsed');
    }
  }

  // ---- List ----
  function renderList() {
    const q = (document.getElementById('searchInput').value || '').toLowerCase();
    const entries = getData()
      .filter(e => e.year === currentYear)
      .filter(e => !q || e.item.toLowerCase().includes(q) || e.category.toLowerCase().includes(q))
      .sort((a, b) => (b.year * 100 + b.month) - (a.year * 100 + a.month) || b.id.localeCompare(a.id));

    const el = document.getElementById('allList');
    if (entries.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📋</div>データがありません</div>';
      return;
    }
    el.innerHTML = entries.map(e => entryHtml(e)).join('');
  }

  // ---- Settings ----
  function renderSettings() {
    const cats = getCategories();
    document.getElementById('categoryTags').innerHTML = cats.map(c => `
      <span class="tag">
        ${escHtml(c)}
        <button onclick="removeCategory('${escHtml(c)}')" title="削除">×</button>
      </span>
    `).join('');
  }

  function addCategory() {
    const input = document.getElementById('newCategoryInput');
    const name = input.value.trim();
    if (!name) return;
    const cats = getCategories();
    if (cats.includes(name)) return showToast('すでに存在します');
    cats.push(name);
    saveCategories(cats);
    input.value = '';
    renderSettings();
    refreshCategorySelect();
    showToast(`「${name}」を追加しました`);
  }

  function removeCategory(name) {
    const cats = getCategories().filter(c => c !== name);
    saveCategories(cats);
    renderSettings();
    refreshCategorySelect();
    showToast(`「${name}」を削除しました`);
  }

  function clearAllData() {
    if (!confirm('本当に全データを削除しますか？この操作は元に戻せません。')) return;
    localStorage.removeItem('kakeibo_entries');
    showToast('全データを削除しました');
    renderSettings();
  }

  // ---- Export ----
  function exportCSV() {
    const entries = getData()
      .filter(e => e.year === currentYear)
      .sort((a, b) => (a.year * 100 + a.month) - (b.year * 100 + b.month));

    if (entries.length === 0) return showToast('データがありません');

    const rows = [['年', '月', 'カテゴリ', '項目', '金額'], ...entries.map(e => [e.year, e.month, e.category, e.item, e.amount])];
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `家計精算_${currentYear}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('CSVを出力しました');
  }

  function escHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
